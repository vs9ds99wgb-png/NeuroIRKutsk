<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroIrk — умный помощник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2c3e50, #4a6491);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            transition: background 0.3s ease;
        }

        body.dark {
            background: linear-gradient(135deg, #1a2634, #2d3b4f);
        }

        .app-container {
            display: flex;
            height: 100%;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.92);
            position: relative;
            transition: background-color 0.3s ease;
        }

        .dark .app-container {
            background-color: rgba(30, 30, 35, 0.95);
        }

        /* ===== БОКОВАЯ ПАНЕЛЬ ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 85%;
            max-width: 320px;
            background: #ffffff;
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s ease, background-color 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.15);
        }

        .dark .sidebar {
            background: #1e1e24;
            border-right: 1px solid #2a2a32;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
            backdrop-filter: blur(2px);
        }

        .overlay.active {
            display: block;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border-color 0.3s ease;
        }

        .dark .sidebar-header {
            border-bottom: 1px solid #2a2a32;
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e1e24;
            transition: color 0.3s ease;
        }

        .dark .sidebar-title {
            color: #f0f0f4;
        }

        .sidebar-menu-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            color: #1e293b;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            transition: background 0.2s, color 0.3s ease, border-color 0.3s ease;
        }

        .dark .sidebar-menu-btn {
            background: #2a2a32;
            border: 1px solid #3a3a4a;
            color: #f0f0f4;
        }

        .sidebar-menu-btn:active {
            background: #e2e8f0;
        }

        .dark .sidebar-menu-btn:active {
            background: #3a3a4a;
        }

        .ds-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
        }

        .new-chat-button {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 12px 16px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            color: #1e293b;
            font-size: 15px;
            font-weight: 500;
            transition: background 0.2s, color 0.3s ease, border-color 0.3s ease;
        }

        .dark .new-chat-button {
            background: #2a2a32;
            border: 1px solid #3a3a4a;
            color: #f0f0f4;
        }

        .new-chat-button:active {
            background: #e2e8f0;
        }

        .dark .new-chat-button:active {
            background: #3a3a4a;
        }

        .settings-section {
            padding: 16px;
            border-bottom: 1px solid #eaeaea;
            transition: border-color 0.3s ease;
        }

        .dark .settings-section {
            border-bottom: 1px solid #2a2a32;
        }

        .settings-title {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 12px;
            transition: color 0.3s ease;
        }

        .dark .settings-title {
            color: #9ca3af;
        }

        .theme-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .theme-btn {
            flex: 1;
            padding: 8px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            color: #1e293b;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s, color 0.3s ease, border-color 0.3s ease;
        }

        .dark .theme-btn {
            background: #2a2a32;
            border: 1px solid #3a3a4a;
            color: #f0f0f4;
        }

        .theme-btn.active {
            background: #0f172a;
            color: white;
            border-color: #0f172a;
        }

        .dark .theme-btn.active {
            background: #3a3a4a;
            border-color: #4a4a5a;
        }

        .language-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .lang-btn {
            padding: 10px 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            color: #1e293b;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s, color 0.3s ease, border-color 0.3s ease;
        }

        .dark .lang-btn {
            background: #2a2a32;
            border: 1px solid #3a3a4a;
            color: #f0f0f4;
        }

        .lang-btn.active {
            background: #0f172a;
            color: white;
            border-color: #0f172a;
        }

        .dark .lang-btn.active {
            background: #3a3a4a;
            border-color: #4a4a5a;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
        }

        .history-item {
            padding: 12px;
            margin-bottom: 6px;
            background: #f8fafc;
            border: 1px solid transparent;
            border-radius: 8px;
            font-size: 14px;
            color: #1e293b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s, color 0.3s ease;
        }

        .dark .history-item {
            background: #2a2a32;
            color: #f0f0f4;
        }

        .history-item:active {
            background: #e2e8f0;
        }

        .dark .history-item:active {
            background: #3a3a4a;
        }

        .history-date {
            font-size: 11px;
            color: #64748b;
            margin-left: 8px;
            white-space: nowrap;
            transition: color 0.3s ease;
        }

        .dark .history-date {
            color: #9ca3af;
        }

        .delete-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: transparent;
            border: none;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .delete-btn:active {
            background: rgba(0,0,0,0.1);
            color: #dc2626;
        }

        .dark .delete-btn:active {
            background: rgba(255,255,255,0.1);
        }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .main-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: border-color 0.3s ease;
        }

        .dark .main-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .main-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-left: 12px;
            transition: color 0.3s ease;
        }

        .dark .main-title {
            color: #f0f0f4;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            padding: 8px 0;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 500;
            flex-shrink: 0;
            transition: background 0.3s ease;
        }

        .user-avatar {
            background: #0f172a;
            color: white;
        }

        .dark .user-avatar {
            background: #3a3a4a;
        }

        .bot-avatar {
            background: #334155;
            color: white;
        }

        .dark .bot-avatar {
            background: #4a4a5a;
        }

        .message-content {
            flex: 1;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.5;
            color: #1e293b;
            white-space: pre-wrap;
            word-break: break-word;
            transition: color 0.3s ease;
        }

        .dark .message-text {
            color: #f0f0f4;
        }

        .input-container {
            padding: 10px 16px 14px 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            transition: border-color 0.3s ease;
        }

        .dark .input-container {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .input-area {
            flex: 1;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.4;
            color: #1e293b;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            outline: none;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .dark .input-area {
            background: #2a2a32;
            border: 1px solid #3a3a4a;
            color: #f0f0f4;
        }

        .input-area:focus {
            border-color: #0f172a;
        }

        .send-button {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #ffffff;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            flex-shrink: 0;
            cursor: pointer;
            transition: background 0.2s, color 0.3s ease, border-color 0.3s ease;
        }

        .dark .send-button {
            background: #2a2a32;
            color: #f0f0f4;
            border: 1px solid #3a3a4a;
        }

        .send-button:active {
            background: #f1f5f9;
        }

        .dark .send-button:active {
            background: #3a3a4a;
        }

        .send-button.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 7px;
            height: 7px;
            background: #64748b;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
            transition: background 0.3s ease;
        }

        .dark .loading-dots span {
            background: #9ca3af;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%,80%,100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        .footer {
            text-align: center;
            padding: 8px 16px 12px;
            font-size: 11px;
            color: #64748b;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        .dark .footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #9ca3af;
        }

        .delete-confirm {
            position: fixed;
            background: white;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 16px;
            z-index: 2000;
            width: 200px;
            border: 1px solid #eaeaea;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .dark .delete-confirm {
            background: #2a2a32;
            border-color: #3a3a4a;
            color: #f0f0f4;
        }

        .delete-confirm p {
            margin-bottom: 16px;
            font-size: 15px;
            font-weight: 500;
        }

        .delete-confirm-buttons {
            display: flex;
            gap: 10px;
        }

        .delete-confirm-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .delete-confirm-yes {
            background: #dc2626;
            color: white;
        }

        .delete-confirm-no {
            background: #f1f5f9;
            color: #1e293b;
        }

        .dark .delete-confirm-no {
            background: #3a3a4a;
            color: #f0f0f4;
        }
    </style>
</head>

                    "Иркутск – город в Восточной Сибири, основан в 1661 году. Население около 600-650 тыс. человек. Расположен на реке Ангаре. Крупный научный и культурный центр. В городе много деревянного зодчества, музеев и театров. Иркутск называют воротами к Байкалу. Город славится своей историей и купеческой архитектурой. Климат резко континентальный.",
                    
                    "Иркутск был основан казаками под руководством Якова Похабова в 1661 году как острог. Сейчас это крупнейший город Восточной Сибири с населением более 600 тысяч человек. Город расположен на берегах Ангары, всего в 66 километрах от озера Байкал. Иркутск известен своей уникальной деревянной архитектурой и богатой купеческой историей.",
                    
                    "Иркутск по праву называют 'культурной столицей Восточной Сибири'. Здесь находятся десятки музеев, театров, исторических памятников. Город играет важную роль в научной жизни региона – здесь расположены Иркутский государственный университет, ИРНИТУ и множество научно-исследовательских институтов. Благодаря близости к Байкалу, Иркутск ежегодно принимает тысячи туристов со всего мира.",
                    
                    "История Иркутска тесно связана с купечеством и торговлей. В XVIII-XIX веках город был крупнейшим торговым центром на пути из России в Китай и Монголию. Купцы Сибиряковы, Баснины, Трапезниковы внесли огромный вклад в развитие города, строя храмы, школы, театры. До сих пор в центре Иркутска можно увидеть купеческие особняки, украшенные затейливой резьбой.",
                    
                    "Иркутск – город с богатой историей и уникальной архитектурой. Здесь сохранилось более 500 памятников деревянного зодчества. Особого внимания заслуживают 130-й квартал (Иркутская слобода), где собраны отреставрированные деревянные дома XIX века. Также в городе много каменных купеческих особняков, православных храмов и музеев. Иркутск – идеальная отправная точка для путешествий на озеро Байкал.",
                    
                    "В Иркутске проживает около 600 тысяч человек, что делает его крупнейшим городом Восточной Сибири. Город является важным транспортным узлом на Транссибирской магистрали. Здесь находится международный аэропорт, железнодорожный вокзал и речной порт. Иркутск – это ворота к Байкалу, через которые проходят миллионы туристов ежегодно.",
                    
                    "Климат Иркутска резко континентальный с холодной зимой и теплым летом. Зимой температура может опускаться до -40°C, а летом подниматься до +30°C. Город расположен в живописном месте на берегах Ангары, единственной реки, вытекающей из Байкала. Ангара не замерзает зимой благодаря теплым водам Байкала, что создает уникальный микроклимат.",
                    
                    "Иркутск славится своим деревянным зодчеством. В городе сохранились целые кварталы деревянных домов XIX века, украшенных уникальной резьбой. Особенно много таких домов в районе 130-го квартала и на улицах Лапина, Фридриха Энгельса, Подгорной. Это настоящее сокровище для ценителей старины и архитектуры.",
                    
                    "В Иркутске много театров и музеев. Главные театры – Драматический театр имени Охлопкова, Музыкальный театр имени Загурского, Театр кукол 'Аистёнок'. Среди музеев особенно выделяются Краеведческий музей (старейший в Сибири), Художественный музей имени Сукачёва, музеи декабристов. Культурная жизнь города очень насыщенна.",
                    
                    "Иркутск сыграл важную роль в истории освоения Сибири и Дальнего Востока. Через город проходили экспедиции Беринга, Шелихова, Невельского. Здесь жили и работали многие известные исследователи. В 19 веке Иркутск стал центром духовной и политической жизни Сибири, местом ссылки декабристов, которые внесли огромный вклад в развитие культуры и образования.",
                    
                    "В Иркутске родились и жили многие знаменитые люди. Драматург Александр Вампилов, режиссер Леонид Гайдай, художник Виталий Рогаль, писатели Валентин Распутин и Марк Сергеев. Их имена носят улицы, театры, библиотеки города. Памятники этим выдающимся личностям можно увидеть в разных частях Иркутска.",
                    
                    "Иркутск – город студентов. Здесь расположены десятки высших и средних учебных заведений. Крупнейшие вузы: Иркутский государственный университет (основан в 1918 году), Иркутский технический университет (ИРНИТУ), Байкальский государственный университет, Медицинский университет. В городе учится более 100 тысяч студентов.",
                    
                    "Экономика Иркутска базируется на машиностроении, авиастроении, энергетике. Крупнейшие предприятия: Иркутский авиационный завод, производящий самолеты Су и Як, Иркутская ГЭС – одна из крупнейших в России. Город также является важным логистическим центром благодаря Транссибу и федеральным трассам.",
                    
                    "В Иркутске много красивых храмов и соборов. Спасская церковь – единственное сохранившееся здание Иркутского кремля. Богоявленский собор – шедевр сибирского барокко. Знаменский монастырь – одно из старейших сооружений города. Казанская церковь, Крестовоздвиженская церковь, Польский костел – все они являются памятниками архитектуры.",

                    "Иркутск – город с уникальным расположением. Он находится в центре Евразии, на пересечении важных торговых путей. Отсюда начинаются дороги на Байкал, в Монголию, Китай. Город окружен живописными холмами, лесами, полями. В окрестностях много туристических баз, санаториев, мест для отдыха.",
                    
                    "В Иркутске много парков и скверов. Центральный парк культуры и отдыха, парк имени 400-летия Иркутска, Ботанический сад ИГУ, острова Юность и Конный на Ангаре – любимые места отдыха горожан. Летом здесь работают аттракционы, кафе, лодочные станции. Зимой заливают катки и прокладывают лыжные трассы.",
                    
                    "Иркутск – город контрастов. Здесь соседствуют старинные деревянные дома и современные высотки, купеческие особняки и торговые центры, православные храмы и буддийские дацаны. Эта смесь стилей и эпох создает неповторимый облик города, привлекающий туристов и исследователей.",
                    
                    "В Иркутске много интересных памятников. Памятник Александру III, основателю Транссиба. Памятник Якову Похабову, основателю города. Памятник Леониду Гайдаю и героям его фильмов. Иркутский бабр – символ города. Памятник Александру Вампилову. Каждый из них имеет свою историю и привлекает внимание гостей города.",
                    
                    "Иркутск – важный научный центр. Здесь находится Восточно-Сибирский научный центр СО РАН, институты геохимии, земной коры, солнечной физики, лимнологии (изучают Байкал). Ученые Иркутска известны во всем мире своими исследованиями Байкала, геологии, экологии. Город гордится своими научными школами.",
                    
                    "В Иркутске развита гастрономическая культура. Много ресторанов сибирской, русской, бурятской, китайской, монгольской кухни. Местные специалитеты: омуль (копченый, соленый, вяленый), байкальские рыбы, блюда из таежных ягод и грибов, буузы (позы), строганина. Обязательно стоит попробовать.",
                    
                    "Иркутск – город с богатыми литературными традициями. Здесь жили и творили писатели Валентин Распутин, Александр Вампилов, Марк Сергеев, Геннадий Машкин. Проводятся литературные фестивали, конференции, встречи с писателями. В городе много книжных магазинов и библиотек, включая старейшую в Сибири библиотеку имени Молчанова-Сибирского.",
                    
                    "В Иркутске много мостов. Главный – Глазковский мост через Ангару, соединяющий центр с левым берегом. Также есть Академический мост, Иннокентьевский мост. Всего в городе более 20 мостов, путепроводов, виадуков. Мосты – важная часть инфраструктуры и архитектурного облика города.",
                    
                    "Иркутск – город с развитой транспортной системой. Есть трамваи, троллейбусы, автобусы, маршрутные такси. Трамвайная сеть – одна из старейших в Сибири (открыта в 1947 году). Иркутский трамвай соединяет центр с отдаленными районами. Также работает электричка и пригородные поезда.",
                    
                    "В окрестностях Иркутска много интересных мест. Архитектурно-этнографический музей 'Тальцы' под открытым небом (47 км от города). Поселок Листвянка на Байкале (70 км). Кругобайкальская железная дорога – памятник инженерного искусства. Остров Ольхон – сердце Байкала. Байкальский музей в Листвянке.",
                    
                    "Иркутск – город с непростой историей. В 1879 году страшный пожар уничтожил половину города. В годы Гражданской войны здесь происходили драматические события, включая расстрел адмирала Колчака. В советское время город активно развивался как индустриальный центр. В 2011 году отметил 350-летие.",
                    
                    "В Иркутске много высотных зданий. Самое высокое – 24-этажный бизнес-центр на улице Октябрьской Революции. Также есть несколько жилых комплексов высотой 18-20 этажей. Из-за сейсмичности региона (7-8 баллов) высотное строительство ограничено, но современные технологии позволяют строить здания повышенной этажности.",
                    
                    "Иркутск – город с развитой социальной инфраструктурой. Десятки школ, детских садов, больниц, поликлиник, спортивных комплексов. Особенно гордятся горожане новым перинатальным центром, онкологическим центром, диагностическими центрами. Медицина в Иркутске считается одной из лучших в Сибири.",
                    
                    "В Иркутске много фонтанов. Самые известные – светомузыкальный фонтан у драмтеатра, фонтан 'Каменный цветок' в сквере Кирова, фонтан на бульваре Гагарина, фонтан в 130-м квартале. Летом фонтаны становятся любимым местом прогулок горожан и туристов. Включение фонтанов происходит в мае и сопровождается праздником.",
                    
                    "Иркутск – город с уникальной экологией. Несмотря на промышленность, воздух в городе относительно чистый благодаря расположению на холмах и близости к Байкалу. Власти и общественность активно борются за сохранение окружающей среды. Проводятся акции по очистке берегов Ангары и Байкала, высаживаются деревья.",
                    
                    "В Иркутске много мест для шопинга. Крупные торговые центры: 'Комсомолл' (самый большой в Восточной Сибири), 'Модный квартал', 'Сильвер Молл', 'Яркомолл', 'Центральный рынок. Есть бутики, магазины, сувенирные лавки. Особой популярностью пользуются сувениры из кедра, бересты, байкальские сувениры.",
                    
                    "Иркутск – город фестивалей. Ежегодно проводятся Байкальский международный кинофестиваль 'Человек и Природа', фестиваль 'Звезды на Байкале' (классическая музыка), джазовый фестиваль, фестиваль уличного искусства, книжный фестиваль. Летом проходит День города – масштабное празднование с концертами и салютом.",
                    
                    "В Иркутске много интересных музеев. Кроме Краеведческого и Художественного, есть Музей истории города, Музей декабристов, Геологический музей, Минералогический музей, Музей связи, Музей пожарного дела, Экспериментарий (научный музей). Каждый найдет музей по интересам.",
                    
                    "Иркутск – город с богатыми религиозными традициями. Здесь действуют православные храмы, католический костел, лютеранская церковь, синагога, мечеть, буддийский дацан. Это отражает многонациональный состав населения и толерантность горожан. Религиозные сооружения являются также памятниками архитектуры.",
                    
                    "В Иркутске много памятников и мемориалов, посвященных войнам. Вечный огонь и мемориал 'Вечная слава' воинам-иркутянам, погибшим в Великой Отечественной войне. Памятник труженикам тыла. Памятник воинам-интернационалистам. Памятник ликвидаторам аварии на Чернобыльской АЭС. Город чтит память защитников Отечества.",
                    
                    "Иркутск – город с развитой системой образования. Кроме вузов, много колледжей, техникумов, училищ. Особенно известны авиационный техникум, медицинский колледж, педагогический колледж, училище искусств. Школьное образование также на высоком уровне – есть лицеи, гимназии, школы с углубленным изучением предметов.",
                    
                    "В Иркутске много красивых набережных. Главная – набережная Ангары вдоль бульвара Гагарина. Также есть набережная у ледокола 'Ангара', набережная в микрорайоне Солнечном. Вдоль набережных проложены пешеходные дорожки, установлены скамейки, фонари, работают кафе. Это излюбленные места прогулок.",

                    "В Иркутске много мест, связанных с декабристами. Дома-музеи Трубецких и Волконских, где воссоздана обстановка XIX века. Могилы декабристов в Знаменском монастыре. Памятные доски на домах, где они жили. Декабристы внесли огромный вклад в развитие культуры и образования в городе и Сибири.",
                    
                    "Иркутск – город с большим будущим. Разработаны планы развития города до 2030 года, включающие строительство новых микрорайонов, дорог, мостов, социальных объектов. Город продолжает расти и развиваться, сохраняя свое историческое наследие. Иркутск остается одним из самых привлекательных городов Сибири."

                // Главные улицы Иркутска
                "главная улица": "Главная улица Иркутска — улица Карла Маркса. Она начинается от площади Кирова и заканчивается у железнодорожного вокзала. Протяженность около 3 км. Здесь находятся Иркутский областной краеведческий музей (дом 13), Драматический театр им. Охлопкова (дом 14).",

                "история": "Иркутск основан 6 июля 1661 года Яковом Похабовым. В 1686 году получил статус города. В XVIII веке стал центром торговли с Китаем. В XIX веке здесь жили декабристы. В 1879 году сильный пожар уничтожил половину города. В 1898 году пришёл первый поезд по Транссибу. В 1918 году основан университет. В 1956 году запущена Иркутская ГЭС. В 2011 году отмечали 350-летие города.",
                
                "история древняя": "Территория современного Иркутска была заселена людьми с древнейших времен. Около 50 тысяч лет назад — древнейшие следы пребывания человека. Глазковский некрополь — захоронения эпохи неолита возрастом более 7 тысяч лет.",
                
                "основание иркутска": "6 июля 1661 года — официальная дата основания Иркутска. Отрядом Якова Похабова заложен Иркутский острог на берегу Ангары при впадении реки Иркут.",
                
                "история 17 век": "1672 год — построена Спасская церковь. 1686 год — Иркутску присвоен статус города. 1689 год — основан Знаменский монастырь.",
                
                "история 18 век": "1762 год — отмена царской монополии на экспорт пушнины, начало «золотого века» иркутского купечества. 1764 год — Иркутск становится центром Иркутской губернии.",
                
                "история 19 век": "1826 год — прибытие первых декабристов. 1879 год — крупный пожар уничтожил половину города. 1898 год — в Иркутск прибыл первый поезд по Транссибирской магистрали.",
                
                "история 20 век": "1918 год — основан Иркутский государственный университет. 1956 год — запущена Иркутская ГЭС.",
                
                "история 21 век": "2011 год — празднование 350-летия Иркутска, создание 130-го квартала. 2020 год — Иркутску присвоено звание «Город трудовой доблести».",
                
                // Байкал
                "байкал": "Озеро Байкал — самое глубокое озеро планеты (1642 м). Находится примерно в 66 км от Иркутска, содержит 20% мировых запасов пресной воды. Байкал — объект Всемирного наследия ЮНЕСКО.",
                
                // Декабристы
                "декабристы": "С середины XIX века в Иркутске на поселении жили декабристы: князья Сергей Трубецкой (ул. Дзержинского, 64), Сергей Волконский (пер. Волконского, 10). Их дома стали музеями.",
                
                // Вузы
                "вузы": "Крупнейшие вузы Иркутска:\n• Иркутский государственный университет (ИГУ) - ул. Карла Маркса, 1\n• Иркутский национальный исследовательский технический университет (ИРНИТУ) - ул. Лермонтова, 83\n• Байкальский государственный университет (БГУ) - ул. Ленина, 11\n• Иркутский государственный медицинский университет - ул. Красного Восстания, 1",
                
                // Транспорт
                "транспорт": "В Иркутске работают: международный аэропорт (ул. Ширямова, 13), железнодорожный вокзал (ул. Челнокова), автовокзал (ул. Октябрьской Революции, 11). Городской транспорт: трамваи, троллейбусы, автобусы, маршрутные такси.",
                
                // Спорт
                "спорт": "В Иркутске есть стадион «Труд» (ул. Ленина, 38), стадион «Рекорд» (ул. Боткина, 2), Дворец спорта «Труд» (ул. Ленина, 40), Ледовый дворец «Айсберг» (ул. Байкальская, 267)."
            },
            
            en: {
                // English version of Irkutsk information
                "irkutsk_options": [
                    "Irkutsk is a city in Eastern Siberia, founded in 1661. Population about 600-650 thousand people. Located on the Angara River. A major scientific and cultural center. The city has many wooden architecture buildings, museums and theaters. Irkutsk is called the gateway to Baikal. The city is famous for its history and merchant architecture. Climate is sharply continental.",
                    
                    "Irkutsk was founded by Cossacks under the leadership of Yakov Pokhabov in 1661 as a stockaded town. Now it is the largest city in Eastern Siberia with a population of more than 600 thousand people. The city is located on the banks of the Angara, just 66 kilometers from Lake Baikal. Irkutsk is known for its unique wooden architecture and rich merchant history.",
                    
                    "Irkutsk is rightly called the 'cultural capital of Eastern Siberia'. There are dozens of museums, theaters, and historical monuments here. The city plays an important role in the scientific life of the region – here are located Irkutsk State University, INRTU and many research institutes. Due to its proximity to Baikal, Irkutsk annually receives thousands of tourists from all over the world.",
                    
                    "The history of Irkutsk is closely connected with merchantry and trade. In the 18th-19th centuries, the city was the largest trading center on the route from Russia to China and Mongolia. Merchants Sibiryakovs, Basnins, Trapeznikovs made a huge contribution to the development of the city, building churches, schools, theaters. Still in the center of Irkutsk you can see merchant mansions decorated with intricate carvings.",
                    
                    "Irkutsk is a city with a rich history and unique architecture. More than 500 wooden architecture monuments have been preserved here. Special attention should be paid to the 130th Quarter (Irkutskaya Sloboda), where restored wooden houses of the 19th century are collected. There are also many stone merchant mansions, Orthodox churches and museums in the city. Irkutsk is an ideal starting point for trips to Lake Baikal."
                ],

                "karl marx street": "Karl Marx Street is the main street of Irkutsk, length about 3 km. Starts from Kirov Square and ends at the railway station. Here are: Irkutsk Regional Museum of Local Lore (building 13), Okhlopkov Drama Theater (building 14).",
                
                "lenin street": "Lenin Street is one of the central streets of Irkutsk. It runs from the Angara embankment to Chkalov Street. Here are: Irkutsk Regional Art Museum (building 5), Irkutsk State University (building 1).",

                // Sights
                "where to go": "In Irkutsk you can visit: Spasskaya Church (Sukhe-Bator St., 2), Epiphany Cathedral (Sukhe-Bator St., 1A), Znamensky Monastery (Angarskaya St., 14), Moscow Triumphal Arch (Nizhnyaya Embankment), monument to Alexander III (Angara embankment), 130th Quarter (Irkutskaya Sloboda), Angara embankment, Museum of Local Lore (Karl Marx St., 13), Art Museum (Lenin St., 5), Decembrists house-museums (Volkonskogo Lane, 10 and Dzerzhinskogo St., 64), icebreaker 'Angara', Drama Theater (Karl Marx St., 14), Circus (Proletarskaya St., 15).",
                
                "spasskaya church": "Spasskaya Church is one of the first stone buildings in Irkutsk. Address: Sukhe-Bator St., 2. The first wooden church was built in 1672.",
                
                "epiphany cathedral": "Epiphany Cathedral was built in 1718–1746. Address: Sukhe-Bator St., 1A.",
                
                "znamensky monastery": "Znamensky Monastery was founded in 1689. Address: Angarskaya St., 14. Participants of the Bering expedition and Decembrists are buried in the necropolis.",
                
                "moscow triumphal arch": "Moscow Triumphal Arch was built in 1811 in honor of the tenth anniversary of the accession of Alexander I to the throne. Address: Nizhnyaya Angara Embankment, at the intersection with Lenin St.",
                
                "monument to alexander iii": "The monument to Emperor Alexander III was founded in 1903, opened in 1908, restored in 2003. Located on the Angara embankment, at the intersection of Gagarin Boulevard and Akademika Obraztsova St.",
                
                "monument to vampilov": "The monument to Alexander Vampilov is installed in the square near the Drama Theater, at: Karl Marx St., 14. Opened in 2003.",
                
                "monument to gaidaev": "The monument to Leonid Gaidai and the heroes of his films is installed on Truda Square in front of the circus, at: Proletarskaya St., 15. Opened in 2012.",
                
                "monument to yakov pokhabov": "Monument to Yakov Pokhabov — sculpture to the founder of the city, installed in 2011 for the 350th anniversary of Irkutsk. Located in the square at the intersection of Lenin St. and Nizhnyaya Embankment.",
                
                "irkutsk babr": "The Irkutsk Babr is a mythical creature on the city's coat of arms. The sculpture is located in the 130th Quarter, on 3 Iyulya St.",
                
                "130 quarter": "The 130th Quarter (Irkutskaya Sloboda) is a historical district created for the 350th anniversary of the city in 2011. Located within the boundaries of streets: Sedova, 3 Iyulya, Dekabrskikh Sobytiy and Kozhova.",
                
                "angara embankment": "Angara River Embankment is a landscaped embankment along Gagarin Boulevard, about 2 km long. It offers a view of the Moscow Gates, monument to Alexander III, icebreaker Angara.",
                
                // Museums
                "local lore museum": "Irkutsk Regional Museum of Local Lore named after N.N. Muravyov-Amursky is the oldest museum in Siberia (founded December 3, 1782). Address: Karl Marx St., 13.",
                
                "art museum": "Irkutsk Regional Art Museum named after V.P. Sukachev. Address: Lenin St., 5.",
                
                "city history museum": "Museum of the History of the City of Irkutsk named after A.M. Sibiryakov. Address: Frank-Kamenetskogo St., 16A.",
                
                "volkonsky house museum": "Decembrists House-Museum of Prince S.G. Volkonsky. Address: Volkonskogo Lane, 10.",
                
                "trubetskoy house museum": "Decembrists House-Museum of Prince S.P. Trubetskoy. Address: Dzerzhinskogo St., 64.",
                
                "sukachev estate": "V.P. Sukachev Estate — former country estate of the Irkutsk philanthropist. Address: Dekabrskikh Sobytiy St., 112.",
                
                "icebreaker angara": "The icebreaker 'Angara' is one of the oldest surviving icebreakers in the world. Launched on July 25, 1900. Located near the Solnechny microdistrict, at the intersection of Gagarin Boulevard and Botkina St.",
                
                "geological museum": "The Geological Museum was created in 1953. Address: Lenin St., 3.",
                
                "bronshtein gallery": "V. Bronshtein Gallery — collection of paintings and sculptures by Siberian masters. Address: Oktyabrskoy Revolyutsii St., 3.",
                
                "taltsy": "The Taltsy Architectural and Ethnographic Museum is located on the Baikal tract (47 km from Irkutsk). Open-air museum.",
                
                "shastin house": "Shastin House (Lace House) — monument of wooden architecture in Art Nouveau style (early XX century). Address: Lapina St., 11.",
                
                "polish church": "Polish Church (Church of the Assumption of the Blessed Virgin Mary) — neo-Gothic building of 1886, now the organ hall of the Philharmonic. Address: Sukhe-Bator St., 1.",
                
                "drama theater": "Irkutsk Academic Drama Theater named after N.P. Okhlopkov, founded in 1850. Address: Karl Marx St., 14.",
                
                "circus": "Irkutsk State Circus, built in 1964. Address: Proletarskaya St., 15.",
                
                "eternal flame": "Eternal Flame and memorial 'Eternal Glory' — monument to Irkutsk soldiers who died in the Great Patriotic War. Located at the intersection of Lenin St. and Nizhnyaya Embankment.",
                
                // History
                "history": "Irkutsk was founded on July 6, 1661 by Yakov Pokhabov. In 1686 it received city status. In the 18th century it became a trade center with China. In the 19th century the Decembrists lived here. In 1879 a big fire destroyed half the city. In 1898 the first train arrived on the Trans-Siberian Railway. In 1918 the university was founded. In 1956 the Irkutsk HPP was launched. In 2011 the 350th anniversary of the city was celebrated.",
                
                "ancient history": "The territory of modern Irkutsk has been inhabited since ancient times. About 50 thousand years ago — the oldest traces of human presence. Glazkovsky necropolis — Neolithic burials over 7 thousand years old.",
                
                "founding of irkutsk": "July 6, 1661 — official founding date of Irkutsk. The Irkutsk stockaded town was founded by Yakov Pokhabov on the banks of the Angara River.",
                
                // Baikal

                // Decembrists
                "decembrists": "From the mid-19th century, the Decembrists lived in settlement in Irkutsk: princes Sergei Trubetskoy (Dzerzhinskogo St., 64), Sergei Volkonsky (Volkonskogo Lane, 10). Their houses became museums.",
                
                // Universities

            zh: {
                // Chinese version of Irkutsk information
                "irkutsk_options": [
                    "伊尔库茨克是东西伯利亚的一座城市，成立于1661年。人口约60-65万。位于安加拉河畔。重要的科学和文化中心。市内拥有众多木结构建筑、博物馆和剧院。伊尔库茨克被称为通往贝加尔湖的门户。这座城市以其历史和商人建筑而闻名。气候为剧烈大陆性气候。",
                    
                    "伊尔库茨克由哥萨克人于1661年在雅科夫·波哈博夫的领导下建立为要塞。现在是东西伯利亚最大的城市，人口超过60万。城市位于安加拉河畔，距离贝加尔湖仅66公里。伊尔库茨克以其独特的木结构建筑和丰富的商人历史而闻名。",
                    
                    "伊尔库茨克被恰当地称为'东西伯利亚的文化之都'。这里有数十家博物馆、剧院和历史古迹。该市在该地区的科学生活中发挥着重要作用 – 这里坐落着伊尔库茨克国立大学、伊尔库茨克国立研究技术大学和许多研究所。由于靠近贝加尔湖，伊尔库茨克每年接待来自世界各地的数千名游客。",
                    
                    "伊尔库茨克的历史与商业和贸易密切相关。在18-19世纪，这座城市是从俄罗斯到中国和蒙古路线上的最大贸易中心。西比里亚科夫、巴斯宁、特拉佩兹尼科夫等商人为城市的发展做出了巨大贡献，建造了教堂、学校、剧院。至今在伊尔库茨克市中心，您仍然可以看到装饰着精美雕刻的商人豪宅。",
                    
                    "伊尔库茨克是一座拥有丰富历史和独特建筑的城市。这里保存了500多处木结构建筑古迹。特别值得一提的是130街区，那里集中了修复后的19世纪木屋。城市中还有许多石砌商人豪宅、东正教教堂和博物馆。伊尔库茨克是前往贝加尔湖旅行的理想起点。"
                ],

        // Сборка секретного токена из частей
        function getSecretToken() {
            const container = document.getElementById('hidden-seed');
            const parts = container.children;
            return parts[0].getAttribute('data-s1') + parts[1].getAttribute('data-s2');
        }

        // Форматирование даты
        function formatDate(date) {
            const d = new Date(date);
            const now = new Date();
            const diff = now - d;
            const days = Math.floor(diff / (1000*60*60*24));
            if (days === 0) return texts[currentLanguage].today;
            if (days === 1) return texts[currentLanguage].yesterday;
            if (days < 7) return `${days} ${texts[currentLanguage].daysAgo}`;
            return d.toLocaleDateString(currentLanguage);
        }

        // Тема
        function setTheme(theme) {
            currentTheme = theme;
            document.documentElement.classList.toggle('dark', theme === 'dark');
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.theme-btn[data-theme="${theme}"]`).classList.add('active');
            localStorage.setItem('neuroirk_theme', theme);
        }

        // Язык
        function setLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
            document.getElementById('userInput').placeholder = texts[lang].placeholder;
            document.querySelector('#newChatBtnSidebar span').textContent = texts[lang].newChat;
            localStorage.setItem('neuroirk_language', lang);
            
            const container = document.getElementById('chatContainer');
            if (container.children.length === 1) {
                container.innerHTML = '';
                addMessage(texts[lang].welcome, false);
            }
        }

        // История
        function updateHistoryList() {
            const list = document.getElementById('chatHistory');
            list.innerHTML = '';
            const chats = Object.values(chatHistory).sort((a,b) => new Date(b.date) - new Date(a.date));
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span style="flex:1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${chat.title}</span>
                    <span class="history-date">${formatDate(chat.date)}</span>
                    <button class="delete-btn" data-id="${chat.id}">⋮</button>
                `;
                div.onclick = (e) => {
                    if (e.target.classList.contains('delete-btn')) return;
                    loadChat(chat.id);
                    closeSidebar();
                };
                div.querySelector('.delete-btn').onclick = (e) => {
                    e.stopPropagation();
                    showDeleteConfirm(chat.id, e.target);
                };
                list.appendChild(div);
            });
        }

        function showDeleteConfirm(chatId, btn) {
            if (activeDeleteMenu) activeDeleteMenu.remove();
            
            const rect = btn.getBoundingClientRect();
            const div = document.createElement('div');
            div.className = 'delete-confirm';
            div.style.top = rect.bottom + 5 + 'px';
            div.style.left = Math.min(rect.left - 150, window.innerWidth - 210) + 'px';
            div.innerHTML = `
                <p>${texts[currentLanguage].deleteConfirm}</p>
                <div class="delete-confirm-buttons">
                    <button class="delete-confirm-btn delete-confirm-yes">${texts[currentLanguage].yes}</button>
                    <button class="delete-confirm-btn delete-confirm-no">${texts[currentLanguage].no}</button>
                </div>
            `;
            
            document.body.appendChild(div);
            activeDeleteMenu = div;
            
            div.querySelector('.delete-confirm-yes').onclick = () => {
                deleteChat(chatId);
                div.remove();
                activeDeleteMenu = null;
            };
            
            div.querySelector('.delete-confirm-no').onclick = () => {
                div.remove();
                activeDeleteMenu = null;
            };
        }

        function deleteChat(id) {
            delete chatHistory[id];
            localStorage.setItem('neuroirk_history', JSON.stringify(chatHistory));
            if (id === currentChatId) newChat();
            else updateHistoryList();
        }

        function loadChat(id) {
            const chat = chatHistory[id];
            if (!chat) return;
            currentChatId = id;
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            chat.messages.forEach(msg => {
                addMessage(msg.question, true);
                addMessage(msg.answer, false);
            });
        }

        function saveChat(question, answer) {
            if (!chatHistory[currentChatId]) {
                chatHistory[currentChatId] = {
                    id: currentChatId,
                    title: question.substring(0,30) + (question.length > 30 ? '...' : ''),
                    date: new Date().toISOString(),
                    messages: []
                };
            } else {
                chatHistory[currentChatId].date = new Date().toISOString();
            }
            chatHistory[currentChatId].messages.push({ question, answer });
            updateHistoryList();
            localStorage.setItem('neuroirk_history', JSON.stringify(chatHistory));
        }

        function newChat() {
            currentChatId = Date.now().toString();
            document.getElementById('chatContainer').innerHTML = '';
            addMessage(texts[currentLanguage].welcome, false);
            closeSidebar();
        }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="message-avatar ${isUser ? 'user-avatar' : 'bot-avatar'}">${isUser ? '👤' : 'AI'}</div>
                <div class="message-content"><div class="message-text">${text}</div></div>
            `;
            document.getElementById('chatContainer').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }

            const q = question.toLowerCase();
            return irkutskKeywords.some(keyword => q.includes(keyword.toLowerCase()));
        }

            const langData = irkutskKnowledge[currentLanguage] || irkutskKnowledge.ru;
            
            // Если вопрос содержит только слово "иркутск" или общие запросы об Иркутске
            if ((q === 'иркутск' || q === 'irkutsk' || q === '伊尔库茨克' || q === 'иркутске' || q === 'об иркутске' || q === 'про иркутск' || q.includes('еще об иркутске') || q.includes('расскажи об иркутске') || q.includes('что такое иркутск')) && q.split(' ').length <= 4) {
                // Используем счетчик для циклического перебора разных вариантов
                if (langData["иркутск_варианты"]) {
                    const options = langData["иркутск_варианты"];
                    const answer = options[irkutskAnswerCounter % options.length];
                    irkutskAnswerCounter++;
                    return answer;
                }
                return langData["иркутск_варианты"] ? langData["иркутск_варианты"][0] : "Иркутск – город в Восточной Сибири.";
            }
            
            // Приоритетные проверки для конкретных запросов
            
            // Куда сходить, достопримечательности
            if (q.includes('куда сходить') || q.includes('достопримечательности') || q.includes('что посмотреть') || q.includes('where to go') || q.includes('sights') || q.includes('景点') || q.includes('去哪里')) {
                return langData["куда сходить"] || langData["where to go"] || langData["去哪里"] || "В Иркутске можно посетить...";
            }
            
            // Главная улица
            if (q.includes('главная улица') || q.includes('main street') || q.includes('主要街道')) {
                return langData["главная улица"] || langData["main street"] || langData["主要街道"] || "Главная улица Иркутска — улица Карла Маркса.";
            }
            
            // Список всех школ
            if (q.includes('все школы') || q.includes('all schools') || q.includes('所有学校') || 
                (q.includes('школ') && q.includes('список'))) {
                return langData["все школы"] || langData["all schools"] || langData["所有学校"] || "Вот список школ Иркутска...";
            }
            
            // Школа 35
            if (q.includes('35') && (q.includes('школ') || q.includes('school'))) {
                return langData["школа 35"] || "Средняя общеобразовательная школа №35 находится по адресу: микрорайон Первомайский, 57.";
            }
            
            // Школа 19
            if (q.includes('19') && (q.includes('школ') || q.includes('school'))) {
                return langData["школа 19"] || "Школа №19 находится по адресу: улица Лермонтова, 279.";
            }
            
            // Школа 55
            if (q.includes('55') && (q.includes('школ') || q.includes('school'))) {
                return langData["школа 55"] || "Школа №55 находится по адресу: микрорайон Университетский, 33.";
            }
            
            // Школа 64
            if (q.includes('64') && (q.includes('школ') || q.includes('school'))) {
                return langData["школа 64"] || "Школа №64 находится по адресу: улица Гидростроителей, 6.";
            }
            
            // Директор гимназии 2
            if ((q.includes('директор') || q.includes('director')) && (q.includes('гимназия 2') || q.includes('gymnasium 2'))) {
                return langData["директор гимназии 2"] || "Директор гимназии №2 — Рублевский Дмитрий Васильевич.";
            }
            
            // Гимназия 2
            if (q.includes('гимназия 2') || q.includes('gymnasium 2')) {
                return langData["гимназия 2"] || "МАОУ г. Иркутска гимназия №2 - микрорайон Университетский, 85.";
            }
            
            // Улица Карла Маркса
            if (q.includes('карла маркса') || q.includes('karl marx')) {
                return langData["улица карла маркса"] || "Улица Карла Маркса — главная улица Иркутска.";
            }
            
            // Улица Ленина
            if (q.includes('ленина') && !q.includes('памятник') && !q.includes('monument')) {
                return langData["улица ленина"] || "Улица Ленина — одна из центральных улиц Иркутска.";
            }
            
            // Бульвар Гагарина
            if (q.includes('гагарина') || q.includes('gagarin')) {
                return langData["бульвар гагарина"] || "Бульвар Гагарина — набережная реки Ангары.";
            }
            
            // История
            if (q.includes('история') || q.includes('history') || q.includes('历史')) {
                return langData["история"] || "Иркутск основан 6 июля 1661 года...";
            }
            
            // Байкал
            if (q.includes('байкал') || q.includes('baikal') || q.includes('贝加尔湖')) {
                return langData["байкал"] || "Озеро Байкал — самое глубокое озеро планеты.";
            }
            
            // Поиск по ключам
            for (let key in langData) {
                if (q.includes(key.toLowerCase())) {
                    return langData[key];
                }
            }
            
            return null; // Возвращаем null, если ничего не найдено по Иркутску
        }

        // Основная функция получения ответа
        async function getAnswer(question) {
            const secret = getSecretToken();
            
            // Проверка на приветствие
            const q = question.toLowerCase().trim();
            const greetings = ['привет', 'здравствуй', 'здравствуйте', 'hello', 'hi', '你好'];
            if (greetings.some(g => q === g || q.startsWith(g + ' ') || q.endsWith(' ' + g) || q.includes(' ' + g + ' '))) {
                return texts[currentLanguage].welcome;
            }
            
            // Проверяем, есть ли информация в базе знаний об Иркутске
            if (isAboutIrkutsk(question)) {
                const context = getIrkutskContext(question);
                if (context) {
                    return context;
                }
            }
            
            // Если вопрос не об Иркутске или информации нет, используем нейросеть
            try {
                const response = await fetch('https://litellm.tokengate.ru/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${secret}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [
                            { role: 'system', content: 'Ты умный ассистент. Отвечай на вопросы чётко, по существу, не уходя в сторону. Ответ должен быть полезным и информативным.' },
                            { role: 'user', content: question }
                        ],
                        temperature: 0.7,
                        max_tokens: 800
                    })
                });
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('API Error:', error);
                
                // Если нейросеть не работает, даем вежливый ответ
                return "Извините, возникла проблема с подключением к нейросети. Пожалуйста, попробуйте позже или задайте вопрос об Иркутске.";
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const question = input.value.trim();
            const sendBtn = document.getElementById('sendBtn');
            
            if (!question || sendBtn.classList.contains('disabled')) return;
            
            sendBtn.classList.add('disabled');
            addMessage(question, true);
            input.value = '';
            input.style.height = 'auto';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message';
            loadingDiv.innerHTML = `
                <div class="message-avatar bot-avatar">AI</div>
                <div class="message-content">
                    <div class="loading">
                        <div class="loading-dots">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('chatContainer').appendChild(loadingDiv);
            loadingDiv.scrollIntoView({ behavior: 'smooth' });

            const answer = await getAnswer(question);
            
            loadingDiv.remove();
            addMessage(answer, false);
            saveChat(question, answer);
            sendBtn.classList.remove('disabled');
        }

        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').classList.add('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateHistoryList();
            
            const savedTheme = localStorage.getItem('neuroirk_theme') || 'light';
            const savedLang = localStorage.getItem('neuroirk_language') || 'ru';
            
            setTheme(savedTheme);
            setLanguage(savedLang);
            newChat();

            document.getElementById('openMenuBtn').onclick = openSidebar;
            document.getElementById('closeSidebarBtn').onclick = closeSidebar;
            document.getElementById('overlay').onclick = closeSidebar;
            document.getElementById('newChatBtnSidebar').onclick = newChat;
            document.getElementById('sendBtn').onclick = sendMessage;
            
            document.getElementById('userInput').onkeydown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };
            
            document.getElementById('userInput').oninput = function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            };

            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.onclick = () => setTheme(btn.dataset.theme);
            });
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.onclick = () => setLanguage(btn.dataset.lang);
            });
        });
    </script>
